<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Component POC</title>
    <style>
      /* ── Layout/engine styles (color-agnostic). Project palette comes from POC_SPEC.themeCss. ── */
      :root {
        --canvas: #1a1c1f;
        --card: #22252a;
        --card-hover: #272b31;
        --text: #e6e8ec;
        --text-dim: #9aa0a8;
        --text-faint: #6c727a;
        --brand: #a7adb7;
        --brand-hover: #c6cbd2;
        --line: rgba(255, 255, 255, 0.08);
        --line-strong: rgba(255, 255, 255, 0.14);
        --good: #6fae8c;
        --mono: "JetBrains Mono", ui-monospace, Consolas, monospace;
        --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic",
          "Apple SD Gothic Neo", Roboto, "Noto Sans KR", sans-serif;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; background: var(--canvas); color: var(--text); font-family: var(--sans); -webkit-font-smoothing: antialiased; }
      header { position: sticky; top: 0; z-index: 10; background: color-mix(in srgb, var(--canvas) 84%, transparent); backdrop-filter: blur(10px); border-bottom: 1px solid var(--line); padding: 16px 28px 0; }
      .htop { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
      header h1 { margin: 0; font-size: 17px; letter-spacing: -0.01em; }
      .prov { font-family: var(--mono); font-size: 11.5px; color: var(--text-faint); }
      header p.brief { margin: 6px 0 0; color: var(--text-dim); font-size: 13px; max-width: 760px; }
      .controls { margin-top: 12px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
      .label { font-size: 12.5px; color: var(--text-faint); }
      .seg { display: inline-flex; gap: 2px; background: rgba(255,255,255,0.04); border-radius: 9px; padding: 3px; }
      .seg button { appearance: none; border: 0; background: transparent; color: var(--text-dim); font: inherit; font-size: 12.5px; padding: 5px 12px; border-radius: 7px; cursor: pointer; }
      .seg button.on { background: color-mix(in srgb, var(--brand) 18%, transparent); color: var(--brand-hover); }
      .tabs { display: flex; gap: 4px; margin-top: 12px; }
      .tab { appearance: none; border: 0; background: transparent; color: var(--text-dim); font: inherit; font-size: 13.5px; font-weight: 600; padding: 9px 14px; border-bottom: 2px solid transparent; cursor: pointer; }
      .tab.on { color: var(--text); border-bottom-color: var(--brand); }
      .tab .badge { font-size: 11px; color: var(--text-faint); margin-left: 6px; }

      main { max-width: 900px; margin: 0 auto; padding: 24px 28px 140px; }
      .empty { color: var(--text-faint); font-size: 13px; padding: 40px 4px; text-align: center; }

      .spec { margin-bottom: 26px; border-radius: 12px; transition: box-shadow .12s; }
      .spec.picked { box-shadow: 0 0 0 2px color-mix(in srgb, var(--good) 60%, transparent); border-radius: 14px; }
      .spec.picked .spec-head .pick { color: var(--good); }
      .spec-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
      .spec-head .num { font-family: var(--mono); font-size: 12px; color: var(--text-faint); background: rgba(255,255,255,0.05); border-radius: 6px; padding: 2px 7px; flex: none; }
      .spec-head h2 { margin: 0; font-size: 14.5px; font-weight: 650; }
      .spec-head .desc { margin: 0; color: var(--text-faint); font-size: 12.5px; flex: 1; min-width: 0; }
      .pick { display: inline-flex; align-items: center; gap: 7px; font-size: 12.5px; color: var(--text-dim); cursor: pointer; flex: none; user-select: none; }
      .pick input { width: 16px; height: 16px; accent-color: var(--good); cursor: pointer; }
      .stage { background: var(--canvas); }

      .footerbar { position: fixed; left: 0; right: 0; bottom: 0; z-index: 20; background: color-mix(in srgb, var(--canvas) 90%, transparent); backdrop-filter: blur(10px); border-top: 1px solid var(--line); padding: 12px 28px; display: flex; align-items: center; gap: 14px; }
      .footerbar .count { font-size: 13px; }
      .footerbar .count b { color: var(--good); }
      .btn { appearance: none; font: inherit; font-size: 13px; border-radius: 9px; padding: 7px 14px; cursor: pointer; border: 1px solid var(--line-strong); background: rgba(255,255,255,0.06); color: var(--text); }
      .btn.primary { background: var(--brand); border-color: var(--brand); color: #1a1c1f; font-weight: 600; }
      .grow { flex: 1; }
      .jsonbox { display: none; position: fixed; left: 0; right: 0; bottom: 58px; z-index: 19; padding: 0 28px; }
      .jsonbox textarea { width: 100%; height: 140px; background: #0e0f11; color: var(--text-dim); border: 1px solid var(--line-strong); border-radius: 10px; font-family: var(--mono); font-size: 12px; padding: 12px; resize: vertical; }
      .toast { position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%); background: var(--good); color: #0e0f11; font-size: 13px; font-weight: 600; padding: 8px 16px; border-radius: 999px; opacity: 0; transition: opacity .2s; z-index: 30; }
      .toast.show { opacity: 1; }
    </style>
  </head>
  <body>
    <header>
      <div class="htop"><h1 id="title">Component POC</h1><span class="prov" id="prov"></span></div>
      <p class="brief" id="brief"></p>
      <div class="controls">
        <div id="sampleWrap" style="display:none"><span class="label">샘플</span> <span class="seg" id="seg"></span></div>
      </div>
      <div class="tabs" id="tabs"></div>
    </header>
    <main id="app"></main>

    <div class="jsonbox" id="jsonbox"><textarea id="jsonout" readonly></textarea></div>
    <div class="footerbar">
      <span class="count">선정 <b id="cnt">0</b>개</span>
      <span class="grow"></span>
      <button class="btn" id="toggleJson">JSON 보기</button>
      <button class="btn primary" id="copyBtn">결과 JSON 복사</button>
    </div>
    <div class="toast" id="toast">복사됨</div>

    <!-- Round data is injected here: defines window.POC_SPEC = { title, brief, round, themeCss, samples, candidates, finalists } -->
    <script>/*__POC_DATA__*/</script>

    <script>
      // ── Engine: consumes window.POC_SPEC, owns voting/tabs/sample-toggle/export. ──
      const S = window.POC_SPEC;
      if (!S) {
        document.getElementById("app").innerHTML =
          '<p class="empty">POC_SPEC 가 주입되지 않았습니다. build_poc.py 로 데이터를 주입해 생성하세요.</p>';
        throw new Error("POC_SPEC missing");
      }
      if (S.themeCss) { const st = document.createElement("style"); st.textContent = S.themeCss; document.head.appendChild(st); }

      document.title = (S.title || "Component POC") + " — POC";
      document.getElementById("title").textContent = S.title || "Component POC";
      document.getElementById("prov").textContent =
        "round " + (S.round ?? 1) + (S.themeSource ? " · theme: " + S.themeSource : "");
      document.getElementById("brief").textContent = S.brief || "";

      const samples = S.samples && S.samples.length ? S.samples : [{ id: "_", label: "기본", data: S.sample }];
      const candidates = S.candidates || [];
      const finalists = S.finalists || [];

      const LSKEY = "poc:" + (S.title || "untitled") + ":r" + (S.round ?? 1);
      const saved = (() => { try { return JSON.parse(localStorage.getItem(LSKEY)) || {}; } catch { return {}; } })();
      const state = {
        sample: samples[0].id,
        tab: "candidates",
        checked: saved.checked || {},
      };
      // Finalists are kept-by-default unless the user explicitly un-checks them this round.
      finalists.forEach((f) => { if (state.checked[f.id] === undefined) state.checked[f.id] = true; });

      function persist() { localStorage.setItem(LSKEY, JSON.stringify({ checked: state.checked })); }
      function curData() { return (samples.find((s) => s.id === state.sample) || samples[0]).data; }

      // ── Sample toggle ──
      const seg = document.getElementById("seg");
      if (samples.length > 1) {
        document.getElementById("sampleWrap").style.display = "";
        seg.innerHTML = samples
          .map((s) => `<button data-s="${s.id}" class="${s.id === state.sample ? "on" : ""}">${s.label}</button>`)
          .join("");
        seg.addEventListener("click", (e) => {
          const b = e.target.closest("button"); if (!b) return;
          state.sample = b.dataset.s;
          [...seg.children].forEach((c) => c.classList.toggle("on", c === b));
          renderApp();
        });
      }

      // ── Tabs ──
      const tabsEl = document.getElementById("tabs");
      function renderTabs() {
        tabsEl.innerHTML =
          `<button class="tab ${state.tab === "candidates" ? "on" : ""}" data-t="candidates">이번 라운드 후보 <span class="badge">${candidates.length}</span></button>` +
          (finalists.length
            ? `<button class="tab ${state.tab === "finalists" ? "on" : ""}" data-t="finalists">확정 후보 <span class="badge">${finalists.length}</span></button>`
            : "");
      }
      tabsEl.addEventListener("click", (e) => {
        const b = e.target.closest(".tab"); if (!b) return;
        state.tab = b.dataset.t; renderTabs(); renderApp();
      });

      // ── Cards ──
      function cardHtml(c, i) {
        const on = !!state.checked[c.id];
        let stage = "";
        try { stage = c.render(curData(), i); } catch (err) { stage = '<p class="empty">render 오류: ' + err.message + "</p>"; }
        return `
          <section class="spec ${on ? "picked" : ""}" data-id="${c.id}">
            <div class="spec-head">
              <span class="num">${String(i).padStart(2, "0")}</span>
              <h2>${c.title || c.id}</h2>
              <p class="desc">${c.desc || ""}</p>
              <label class="pick"><input type="checkbox" ${on ? "checked" : ""} data-check="${c.id}" /> 선정</label>
            </div>
            <div class="stage">${stage}</div>
          </section>`;
      }
      const app = document.getElementById("app");
      function renderApp() {
        const list = state.tab === "finalists" ? finalists : candidates;
        app.innerHTML = list.length
          ? list.map((c, idx) => cardHtml(c, idx + 1)).join("")
          : '<p class="empty">항목이 없습니다.</p>';
        updateCount();
      }
      app.addEventListener("change", (e) => {
        const cb = e.target.closest("input[data-check]");
        if (cb) {
          state.checked[cb.dataset.check] = cb.checked;
          cb.closest(".spec").classList.toggle("picked", cb.checked);
          persist(); updateCount(); return;
        }
      });
      // ── Footer: count + export ──
      const byId = {};
      [...candidates, ...finalists].forEach((c) => { byId[c.id] = c; });
      // Only count/export ids present in THIS round (candidates+finalists) — guard against
      // stale checks bleeding in from a prior round's localStorage at the same file:// origin.
      function keptIds() { return Object.keys(state.checked).filter((k) => state.checked[k] && byId[k]); }
      function updateCount() { document.getElementById("cnt").textContent = keptIds().length; }
      function resultJson() {
        // Carry just id (번호) + name + description — enough to identify picks and carry them forward.
        const kept = keptIds().map((id) => ({ id, name: byId[id]?.title || id, desc: byId[id]?.desc || "" }));
        return JSON.stringify({ title: S.title, round: S.round ?? 1, kept }, null, 2);
      }
      const jsonbox = document.getElementById("jsonbox");
      const jsonout = document.getElementById("jsonout");
      document.getElementById("toggleJson").addEventListener("click", () => {
        const show = jsonbox.style.display !== "block";
        jsonbox.style.display = show ? "block" : "none";
        if (show) { jsonout.value = resultJson(); jsonout.focus(); jsonout.select(); }
      });
      const toast = document.getElementById("toast");
      function flash(msg) { toast.textContent = msg; toast.classList.add("show"); setTimeout(() => toast.classList.remove("show"), 1400); }
      document.getElementById("copyBtn").addEventListener("click", async () => {
        const txt = resultJson();
        try { await navigator.clipboard.writeText(txt); flash("복사됨 — 채팅에 붙여넣기"); }
        catch {
          jsonbox.style.display = "block"; jsonout.value = txt; jsonout.focus(); jsonout.select();
          try { document.execCommand("copy"); flash("복사됨 — 채팅에 붙여넣기"); }
          catch { flash("아래 JSON 을 직접 복사하세요"); }
        }
      });

      renderTabs(); renderApp();
    </script>
  </body>
</html>
